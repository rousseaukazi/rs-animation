<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RS Animation Lab</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #fff;
    min-height: 100vh;
    padding: 48px 24px;
  }
  h1 {
    text-align: center;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 48px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #181818;
    border-radius: 16px;
    border: 1px solid #282828;
    padding: 40px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: relative;
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #444;
  }
  .svg-wrap {
    width: 100%;
    max-width: 320px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .svg-wrap svg {
    width: 100%;
    height: auto;
  }
  .pause-btn {
    background: #222;
    border: 1px solid #333;
    border-radius: 8px;
    color: #888;
    font-size: 14px;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .pause-btn:hover { background: #2a2a2a; color: #ccc; border-color: #444; }

  /* Animation 2: clip wipe */
  .clip-wrap { position: relative; overflow: hidden; }
  .clip-fill { clip-path: inset(0 100% 0 0); }

  /* Animation 3: shimmer */
  .shimmer-wrap { position: relative; }
  .shimmer-overlay {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    pointer-events: none;
    transform: skewX(-12deg);
  }

  /* Animation 4: glow pulse */
  @keyframes glow-pulse {
    0%, 100% { filter: drop-shadow(0 0 4px #DB1919) drop-shadow(0 0 8px #DB191940); }
    50% { filter: drop-shadow(0 0 14px #DB1919) drop-shadow(0 0 28px #DB1919aa); }
  }
  .glow-svg { animation: none; }
</style>
</head>

<script>
// ─── Animation 1: Draw-on (stroke-dashoffset) ───────────────────────────────
const path1 = document.getElementById('path1');
let len1;
window.addEventListener('load', () => {
  len1 = path1.getTotalLength();
  path1.style.strokeDasharray = len1;
  path1.style.strokeDashoffset = len1;
  path1.style.fill = 'none';
  runAnim1();
});

let tl1, paused1 = false;
function runAnim1() {
  tl1 = gsap.timeline({ repeat: -1, repeatDelay: 0.8 });
  tl1.to(path1, { strokeDashoffset: 0, duration: 2.5, ease: 'power2.inOut' })
     .to(path1, { fill: '#DB1919', duration: 0.5, ease: 'power1.in' })
     .to(path1, { opacity: 0, duration: 0.3, delay: 0.8 })
     .set(path1, { strokeDashoffset: len1, fill: 'none', opacity: 1 });
}
document.getElementById('btn1').addEventListener('click', function() {
  paused1 = !paused1;
  paused1 ? tl1.pause() : tl1.resume();
  this.textContent = paused1 ? '▶ Play' : '⏸ Pause';
});

// ─── Animation 2: Left-to-right wipe (dark red, clip-path) ──────────────────
const svg2 = document.getElementById('svg2');
let tl2, paused2 = false;
function runAnim2() {
  tl2 = gsap.timeline({ repeat: -1, repeatDelay: 0.8 });
  tl2.fromTo(svg2,
    { clipPath: 'inset(0 100% 0 0)' },
    { clipPath: 'inset(0 0% 0 0)', duration: 2, ease: 'power2.inOut' })
     .to(svg2, { opacity: 0, duration: 0.3, delay: 0.8 })
     .set(svg2, { opacity: 1, clipPath: 'inset(0 100% 0 0)' });
}
runAnim2();
document.getElementById('btn2').addEventListener('click', function() {
  paused2 = !paused2;
  paused2 ? tl2.pause() : tl2.resume();
  this.textContent = paused2 ? '▶ Play' : '⏸ Pause';
});

// ─── Animation 3: Shimmer sweep ──────────────────────────────────────────────
const shimmer = document.getElementById('shimmer');
const wrap3 = document.getElementById('wrap3');
let tl3, paused3 = false;
function runAnim3() {
  tl3 = gsap.timeline({ repeat: -1, repeatDelay: 1.2 });
  tl3.fromTo(shimmer,
    { left: '-40%' },
    { left: '120%', duration: 1.4, ease: 'power1.inOut' });
}
runAnim3();
document.getElementById('btn3').addEventListener('click', function() {
  paused3 = !paused3;
  paused3 ? tl3.pause() : tl3.resume();
  this.textContent = paused3 ? '▶ Play' : '⏸ Pause';
});

// ─── Animation 4: Glow pulse ─────────────────────────────────────────────────
const glowPath = document.getElementById('glow-path');
let tl4, paused4 = false;
function runAnim4() {
  tl4 = gsap.timeline({ repeat: -1, yoyo: true });
  tl4.to(glowPath, {
    filter: 'drop-shadow(0 0 16px #DB1919) drop-shadow(0 0 32px #DB1919)',
    duration: 1.4,
    ease: 'sine.inOut'
  });
}
runAnim4();
document.getElementById('btn4').addEventListener('click', function() {
  paused4 = !paused4;
  paused4 ? tl4.pause() : tl4.resume();
  this.textContent = paused4 ? '▶ Play' : '⏸ Pause';
});
</script>
