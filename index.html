<script>
window.addEventListener('load', () => {
  const outer = document.getElementById('p-outer');
  const sInner = document.getElementById('p-s');
  const rInner = document.getElementById('p-r');
  const all = [outer, sInner, rInner];

  // Measure and set up dash offsets
  const lens = all.map(p => p.getTotalLength());
  all.forEach((p, i) => {
    p.style.strokeDasharray = lens[i];
    p.style.strokeDashoffset = lens[i];
  });

  const tl = gsap.timeline({ repeat: -1, repeatDelay: 1 });

  // 1. Draw outer
  tl.to(outer, { strokeDashoffset: 0, duration: 2.2, ease: 'power2.inOut' })
  // 2. Draw S counter
    .to(sInner, { strokeDashoffset: 0, duration: 0.6, ease: 'power2.inOut' }, '-=0.1')
  // 3. Draw R counter
    .to(rInner, { strokeDashoffset: 0, duration: 0.6, ease: 'power2.inOut' }, '-=0.2')
  // 4. Fill all in
    .to(all, { fill: '#DB1919', duration: 0.5, ease: 'power1.in' }, '+=0.1')
  // 5. Fade out and reset
    .to(all, { opacity: 0, duration: 0.4, delay: 1 })
    .call(() => {
      all.forEach((p, i) => {
        gsap.set(p, { strokeDashoffset: lens[i], fill: 'none', opacity: 1 });
      });
    });
});
</script>
